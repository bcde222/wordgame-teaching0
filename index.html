<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师端 - 英语课堂抢答</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;padding:16px;max-width:800px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h2{margin-bottom:12px;color:#333}
h3{margin-bottom:8px;color:#555}
.room-code{font-size:52px;font-weight:bold;text-align:center;color:#1890ff;letter-spacing:12px;padding:12px 0}
.room-hint{text-align:center;color:#999;font-size:14px;margin-bottom:8px}
.status{text-align:center;padding:10px;border-radius:8px;margin:8px 0;font-size:15px}
.status.ok{background:#f6ffed;color:#52c41a}
.status.err{background:#fff2f0;color:#ff4d4f}
.status.warn{background:#fffbe6;color:#faad14}
.btn{display:inline-block;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:16px;font-weight:500;transition:all .2s;margin:4px}
.btn-primary{background:#1890ff;color:#fff}
.btn-primary:hover{background:#40a9ff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-success{background:#52c41a;color:#fff}
.btn-warning{background:#faad14;color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
select{padding:8px 16px;border-radius:8px;border:1px solid #d9d9d9;font-size:16px;outline:none}
select:focus{border-color:#1890ff}
.student-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.student-tag{background:#e6f7ff;color:#1890ff;padding:6px 14px;border-radius:16px;font-size:14px}
.racer-box{background:#fff7e6;border:2px solid #ffa940;border-radius:12px;padding:16px;text-align:center;font-size:22px;font-weight:bold;margin:8px 0;animation:pulse .8s ease-in-out}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.result{padding:16px;border-radius:12px;text-align:center;font-size:20px;font-weight:bold;margin:8px 0}
.result.correct{background:#f6ffed;color:#52c41a;border:2px solid #b7eb8f}
.result.wrong{background:#fff2f0;color:#ff4d4f;border:2px solid #ffccc7}
.q-display{font-size:36px;text-align:center;padding:16px;font-weight:bold;color:#333;word-break:break-all}
.a-display{font-size:16px;color:#999;text-align:center;margin-top:4px}
.flex-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- 房间卡片 -->
<div class="card" id="roomCard">
  <h2>🏫 教师端 - 英语课堂抢答</h2>
  <p class="room-hint">房间号（告诉学生）</p>
  <div class="room-code" id="roomCode">----</div>
  <div class="status warn" id="status">点击下方按钮创建房间</div>
  <div style="text-align:center">
    <button class="btn btn-primary" id="createBtn" onclick="createRoom()">创建房间</button>
  </div>
</div>

<!-- 题目控制 -->
<div class="card" id="controlCard" style="display:none">
  <h3>📋 出题控制</h3>
  <div class="flex-row" style="margin:10px 0">
    <label>题型：</label>
    <select id="mode">
      <option value="en2cn">英译汉</option>
      <option value="cn2en">汉译英</option>
      <option value="fill">挖空填空</option>
    </select>
  </div>
  <div class="flex-row">
    <button class="btn btn-primary" onclick="nextQuestion()">📢 下一题</button>
    <button class="btn btn-warning" onclick="unlockRace()" id="unlockBtn" style="display:none">🔓 解锁抢答</button>
    <button class="btn btn-danger" onclick="closeRoom()">关闭房间</button>
  </div>
</div>

<!-- 当前题目 -->
<div class="card" id="questionCard" style="display:none">
  <h3>📝 当前题目</h3>
  <div class="q-display" id="qDisplay"></div>
  <div class="a-display" id="aDisplay"></div>
</div>

<!-- 在线学生 -->
<div class="card" id="studentCard" style="display:none">
  <h3>👥 在线学生（<span id="sCount">0</span>人）</h3>
  <div class="student-list" id="sList"></div>
</div>

<!-- 抢答结果 -->
<div class="card" id="raceCard" style="display:none">
  <h3>🏆 抢答情况</h3>
  <div id="racerInfo"></div>
  <div id="resultInfo"></div>
</div>

<script>
// ====== 词库 ======
const WORDS=[
  {en:"apple",cn:"苹果"},{en:"banana",cn:"香蕉"},{en:"cat",cn:"猫"},
  {en:"dog",cn:"狗"},{en:"elephant",cn:"大象"},{en:"fish",cn:"鱼"},
  {en:"grape",cn:"葡萄"},{en:"horse",cn:"马"},{en:"ice",cn:"冰"},
  {en:"juice",cn:"果汁"},{en:"kite",cn:"风筝"},{en:"lion",cn:"狮子"},
  {en:"monkey",cn:"猴子"},{en:"nose",cn:"鼻子"}
];

// ====== 状态 ======
let peer=null, students={}, curQ=null, racerConn=null, racerName=null, roomCode='';

// ====== 创建房间 ======
function createRoom(){
  if(peer){peer.destroy();peer=null;}
  students={};racerConn=null;racerName=null;curQ=null;

  roomCode=String(Math.floor(1000+Math.random()*9000));
  document.getElementById('roomCode').textContent=roomCode;
  setStatus('正在连接服务器...','warn');
  document.getElementById('createBtn').disabled=true;

  peer=new Peer('wg'+roomCode);

  peer.on('open',()=>{
    setStatus('✅ 房间已创建！请告诉学生房间号：'+roomCode,'ok');
    show('controlCard');show('studentCard');
    document.getElementById('createBtn').style.display='none';
  });

  peer.on('connection',conn=>{
    conn.on('open',()=>{});
    conn.on('data',d=>handleMsg(conn,d));
    conn.on('close',()=>removeStu(conn));
    conn.on('error',()=>removeStu(conn));
  });

  peer.on('error',err=>{
    if(err.type==='unavailable-id'){
      setStatus('房间号冲突，请重试','err');
      document.getElementById('createBtn').disabled=false;
    }else{
      setStatus('❌ 连接错误: '+err.type,'err');
    }
  });

  peer.on('disconnected',()=>{
    setStatus('⚠️ 与服务器断开，尝试重连...','warn');
    peer.reconnect();
  });
}

// ====== 处理学生消息 ======
function handleMsg(conn,data){
  switch(data.type){
    case 'join':
      students[conn.peer]={conn,name:data.name};
      updateStuList();
      // 如果当前有题，发给新加入的学生
      if(curQ){
        conn.send({type:'question',q:curQ.q,mode:curQ.mode,fillOptions:curQ.fillOptions});
        if(racerName) conn.send({type:'locked',racerName});
      }
      break;

    case 'race':
      if(!racerName){
        const stu=students[conn.peer];
        if(!stu)break;
        racerName=stu.name;
        racerConn=conn;
        broadcast({type:'locked',racerName});
        // 通知抢答者可以输入答案
        conn.send({type:'pleaseAnswer'});
        show('raceCard');
        document.getElementById('racerInfo').innerHTML='<div class="racer-box">🏃 '+racerName+' 抢答了！</div>';
        document.getElementById('resultInfo').innerHTML='';
        show('unlockBtn');
      }else{
        conn.send({type:'raceFail',msg:'已有同学抢答'});
      }
      break;

    case 'answer':
      if(conn.peer===racerConn?.peer && curQ){
        const correct=checkAns(data.answer,curQ);
        conn.send({type:'result',correct,answer:curQ.answer});
        broadcast({type:'raceResult',racerName,correct,answer:curQ.answer});
        showResult(racerName,correct,data.answer);
      }
      break;
  }
}

// ====== 出题 ======
function nextQuestion(){
  const mode=document.getElementById('mode').value;
  const word=WORDS[Math.floor(Math.random()*WORDS.length)];

  let q,answer,fillOptions=null,correctPart=null;

  if(mode==='en2cn'){
    q=word.en; answer=word.cn;
  }else if(mode==='cn2en'){
    q=word.cn; answer=word.en;
  }else{
    const chars=word.en.split('');
    const hideIdx=Math.floor(Math.random()*chars.length);
    correctPart=chars[hideIdx];
    q=chars.map((c,i)=>i===hideIdx?'____':c).join('');
    answer=word.en;

    // 生成干扰项（随机字母，不重复）
    const alpha='abcdefghijklmnopqrstuvwxyz'.split('').filter(c=>c!==correctPart);
    shuffle(alpha);
    const distractors=alpha.slice(0,3);
    const all=[correctPart,...distractors];
    shuffle(all);
    fillOptions={A:all[0],B:all[1],C:all[2],D:all[3]};
  }

  curQ={q,mode,answer,fillOptions,correctPart};
  racerName=null;racerConn=null;

  // 显示题目
  show('questionCard');
  document.getElementById('qDisplay').textContent=q;
  let ansText='答案：'+answer;
  if(fillOptions){
    const correctOpt=Object.entries(fillOptions).find(([k,v])=>v===correctPart);
    ansText+=' （正确选项：'+correctOpt[0]+'）';
  }
  document.getElementById('aDisplay').textContent=ansText;

  // 广播给学生（不发送正确答案！）
  broadcast({type:'question',q,mode,fillOptions});

  // 重置抢答
  hide('raceCard');hide('unlockBtn');
}

// ====== 解锁抢答（抢答者掉线或超时时用） ======
function unlockRace(){
  racerName=null;racerConn=null;
  broadcast({type:'unlock'});
  document.getElementById('racerInfo').innerHTML='<div style="text-align:center;color:#999">抢答已解锁，学生可以重新抢答</div>';
  hide('unlockBtn');
}

// ====== 关闭房间 ======
function closeRoom(){
  if(peer){peer.destroy();peer=null;}
  students={};racerConn=null;racerName=null;curQ=null;
  setStatus('房间已关闭','warn');
  document.getElementById('roomCode').textContent='----';
  document.getElementById('createBtn').style.display='inline-block';
  document.getElementById('createBtn').disabled=false;
  hide('controlCard');hide('questionCard');hide('studentCard');hide('raceCard');hide('unlockBtn');
}

// ====== 判断答案 ======
function checkAns(studentAns,question){
  if(!question)return false;
  if(question.mode==='fill'){
    // 学生发送选项字母(A/B/C/D)，查找对应字符
    const selChar=question.fillOptions?.[studentAns];
    return selChar===question.correctPart;
  }
  return studentAns.trim().toLowerCase()===question.answer.trim().toLowerCase();
}

// ====== 显示结果 ======
function showResult(name,correct,stuAns){
  const div=document.getElementById('resultInfo');
  if(correct){
    div.innerHTML='<div class="result correct">✅ '+name+' 回答正确！答案：'+curQ.answer+'</div>';
  }else{
    div.innerHTML='<div class="result wrong">❌ '+name+' 回答错误！正确答案：'+curQ.answer+'（学生答案：'+stuAns+'）</div>';
  }
}

// ====== 工具函数 ======
function broadcast(data){
  Object.values(students).forEach(s=>{
    try{if(s.conn.open)s.conn.send(data);}catch(e){}
  });
}
function removeStu(conn){
  if(students[conn.peer]){
    const name=students[conn.peer].name;
    delete students[conn.peer];
    updateStuList();
    // 如果抢答者掉线，解锁
    if(racerConn?.peer===conn.peer){
      racerName=null;racerConn=null;
      broadcast({type:'unlock'});
      document.getElementById('racerInfo').innerHTML='<div style="text-align:center;color:#faad14">⚠️ '+name+' 已断开，抢答已解锁</div>';
    }
  }
}
function updateStuList(){
  const names=Object.values(students).map(s=>s.name);
  document.getElementById('sList').innerHTML=names.map(n=>'<span class="student-tag">'+n+'</span>').join('')||'<span style="color:#999">暂无学生</span>';
  document.getElementById('sCount').textContent=names.length;
}
function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.textContent=msg;el.className='status '+cls;
}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
</script>
</body>
</html>
